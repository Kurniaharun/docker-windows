services:
  windows:
    build: .
    image: dockurr/windows:ghostspectre
    container_name: windows
    environment:
      VERSION: "gs11"
      # Ghost Spectre = install manual (MANUAL:Y). Set akun saat setup installer:
      # User: Administrator | Pass: 12345678
      RAM_SIZE: "6G"
      CPU_CORES: "2"
      DISK_SIZE: "32G"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
      - ./shared:/shared
    restart: always
    stop_grace_period: 2m
